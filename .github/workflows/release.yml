name: release

# Build a self-contained `openproject` binary for each platform plus the Python
# wheel/sdist and attach them to the GitHub Release when you push a version tag
# (e.g. `git tag v0.1.0 && git push --tags`).
#
# Each job uploads its own artifact to the release as soon as it finishes, so a
# slow/queued runner (e.g. macOS-Intel) never blocks the other platforms.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: openproject-linux-x86_64
          - os: macos-latest      # Apple Silicon -> arm64
            asset: openproject-macos-arm64
          - os: macos-13          # Intel
            asset: openproject-macos-x86_64
          - os: windows-latest
            asset: openproject-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project + PyInstaller
        run: pip install -e '.[build]'

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/build_binary.sh

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --clean --onefile --name openproject `
            --paths src --collect-all keyring `
            --hidden-import keyring.backends.Windows `
            --hidden-import keyring.backends.chainer `
            --hidden-import keyring.backends.fail `
            --distpath dist --workpath build/pyinstaller --specpath build `
            packaging/op_launcher.py

      - name: Rename asset
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then mv dist/openproject.exe "dist/${{ matrix.asset }}";
          else mv dist/openproject "dist/${{ matrix.asset }}"; fi

      - name: Smoke test
        shell: bash
        run: "dist/${{ matrix.asset }} --help >/dev/null && echo ok"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          generate_release_notes: true

  # Python wheel + sdist (for pip/pipx) — attaches independently.
  python-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # Publish to PyPI via Trusted Publishing (OIDC) — no API token/secret needed.
  # One-time setup on PyPI: Your projects -> Publishing -> add a pending publisher
  #   PyPI project name: agent-tool-openproject-cli
  #   Owner:  alexander-zierhut
  #   Repo:   agent-tool-openproject-cli
  #   Workflow: release.yml
  #   Environment: pypi
  pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agent-tool-openproject-cli
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build

      # The guard the 0.5.0 release needed and did not have. When pyproject
      # carried a STATIC version, a bump to __init__.py alone produced a wheel
      # still stamped with the old version; PyPI rejected it as "File already
      # exists" AFTER the tag was cut and the GitHub release published. Reading
      # the version off the built wheel and comparing it to the tag turns that
      # into a fast, obvious failure before upload. (pyproject is now dynamic, so
      # the mismatch cannot recur — but the guard is cheap and catches the next
      # surprise too.)
      - name: Tag must match the built version
        run: |
          WHL=$(ls dist/*.whl)
          BUILT=$(basename "$WHL" | cut -d- -f2)
          TAG="${GITHUB_REF_NAME#v}"
          echo "built=$BUILT tag=$TAG  ($(basename "$WHL"))"
          [ "$BUILT" = "$TAG" ] || { echo "::error::tag v$TAG != built version $BUILT"; exit 1; }

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # A re-run to fix a failed per-platform binary must not die on "File
          # already exists" for a version that published fine. A forgotten bump is
          # still caught by the guard above.
          skip-existing: true
